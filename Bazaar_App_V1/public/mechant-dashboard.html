<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazaar DAO | Merchant Terminal</title>
    <style>
        /* [PASTE ALL YOUR CSS STYLES HERE] */
        :root { --bazaar-gold: #FFD700; --bazaar-dark: #1a1a1a; --mesh-green: #00ff41; --mesh-red: #ff0000; }
        body { background: var(--bazaar-dark); color: #e0e0e0; font-family: 'Courier New', monospace; text-align: center; margin:0; }
        .ts-module { border: 1px solid var(--bazaar-gold); background: rgba(0,0,0,0.5); padding: 15px; margin: 20px; }
        .ts-bar-bg { width: 100%; height: 20px; background: #111; border: 1px solid #333; }
        .ts-bar-fill { height: 100%; width: 100%; transition: 0.5s; }
        .ts-optimal { background-color: var(--mesh-green); }
        .ts-warning { background-color: #ffaa00; }
        .ts-critical { background-color: var(--mesh-red); }
        .log-entry { display: flex; justify-content: space-between; font-size: 0.8rem; border-bottom: 1px solid #222; padding: 5px; }
        .impact-negative { color: var(--mesh-red); }
        .impact-positive { color: var(--mesh-green); }
    </style>
</head>
<body>

    <nav style="background: #111; border-bottom: 2px solid var(--bazaar-gold); padding: 10px; display: flex; justify-content: center; gap: 20px;">
        <a href="merchant-dashboard.html" style="color: var(--bazaar-gold); text-decoration: none;">[ DASHBOARD ]</a>
        <a href="merchant-leaderboard.html" style="color: var(--bazaar-gold); text-decoration: none;">[ LEADERBOARD ]</a>
        <a href="merchant-catalog.html" style="color: var(--bazaar-gold); text-decoration: none;">[ CATALOG ]</a>
    </nav>

    <h1>MERCHANT TERMINAL v23</h1>

    <div class="ts-module">
        <div style="display:flex; justify-content:space-between; font-weight:bold;">
            <span>[ TRUST COMMODITY ]</span>
            <span id="ts-score-display">100 / 100 TS</span>
        </div>
        <div class="ts-bar-bg">
            <div id="ts-bar" class="ts-bar-fill ts-optimal"></div>
        </div>
        <div id="ts-status-msg" style="margin-top:10px; font-size:0.8rem; color:var(--mesh-green);">
            STATUS: OPTIMAL. SOVEREIGN PEG SECURED.
        </div>
    </div>

    <div class="ts-module" style="border-color: var(--bazaar-gold); text-align:left;">
        <div style="font-weight:bold; color:var(--bazaar-gold); margin-bottom:10px;">[ MINT PHYSICAL ASSET ]</div>
        <input type="text" id="rwa-name" placeholder="Item Name" style="width:95%; background:#000; color:#fff; border:1px solid #444; padding:10px; margin-bottom:10px;">
        <input type="number" id="rwa-price" placeholder="Price in PHP" oninput="calculateBZR(this.value)" style="width:95%; background:#000; color:#fff; border:1px solid #444; padding:10px;">
        <p style="font-size: 0.8rem; color: var(--bazaar-gold);">VALUE: <span id="bzr-preview">0.00</span> BZR</p>
        <button onclick="mintRWA()" style="width:100%; background:var(--bazaar-gold); color:#000; font-weight:bold; border:none; padding:12px; cursor:pointer;">MINT TO X570 REGISTRY</button>
    </div>

    <div class="ts-module" style="text-align:left;">
        <div style="font-weight:bold; color:var(--bazaar-gold); border-bottom:1px solid #333; padding-bottom:5px;">[ RECENT ACTIVITY ]</div>
        <div id="justice-history-body">
            </div>
    </div>

    <script>
        const MESH_API = "https://hypercoagulable-nondistortingly-valarie.ngrok-free.dev";
        const EXILE_THRESHOLD = 74;
        const MY_USERNAME = "PinoyQ8";

        async function syncBazaarData() {
            try {
                const ledgerRes = await fetch(`${MESH_API}/get-ledger`);
                const ledger = await ledgerRes.json();
                const me = ledger.find(p => p.pioneer === MY_USERNAME);

                const historyRes = await fetch(`${MESH_API}/get-transactions`);
                const history = await historyRes.json();

                if (me) renderTS(me.trust_score, me.status);
                renderHistory(history);
            } catch (err) {
                document.getElementById('ts-status-msg').innerHTML = "!! SYSTEM OFFLINE !!";
            }
        }

        function renderTS(score, status) {
            const bar = document.getElementById('ts-bar');
            const display = document.getElementById('ts-score-display');
            const msg = document.getElementById('ts-status-msg');
            bar.style.width = score + '%';
            display.innerText = score + ' / 100 TS';
            if (status === "Exiled") bar.className = "ts-bar-fill ts-critical";
            else if (score <= EXILE_THRESHOLD) bar.className = "ts-bar-fill ts-critical";
            else if (score <= 89) bar.className = "ts-bar-fill ts-warning";
            else bar.className = "ts-bar-fill ts-optimal";
        }

        function renderHistory(logs) {
            const historyBody = document.getElementById('justice-history-body');
            const myLogs = logs.filter(entry => entry.pioneer === MY_USERNAME);
            historyBody.innerHTML = myLogs.map(entry => `
                <div class="log-entry">
                    <span>${entry.timestamp.split(',')[1] || entry.timestamp}</span>
                    <span>${entry.details}</span>
                    <span class="${entry.amount_bzr.toString().includes('-') ? 'impact-negative' : 'impact-positive'}">${entry.amount_bzr}</span>
                </div>
            `).join('');
        }

        function calculateBZR(php) {
            document.getElementById('bzr-preview').innerText = (php / 10).toFixed(2);
        }

        async function mintRWA() {
            const name = document.getElementById('rwa-name').value;
            const price = document.getElementById('rwa-price').value;
            if (!name || !price) return alert("All fields required.");
            try {
                const response = await fetch(`${MESH_API}/add-inventory`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ merchant: MY_USERNAME, item_name: name, price_php: price })
                });
                const result = await response.json();
                if (result.status === "SUCCESS") {
                    alert("ASSET MINTED!");
                    window.location.href = "merchant-catalog.html";
                }
            } catch (err) { alert("Mesh Offline."); }
        }

        setInterval(syncBazaarData, 10000);
        syncBazaarData();
    </script>
</body>
</html>
