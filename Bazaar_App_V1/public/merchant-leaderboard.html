<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazaar DAO | Global Leaderboard</title>
    <style>
        :root { --bazaar-gold: #FFD700; --bazaar-dark: #0a0a0a; --mesh-green: #00ff41; --mesh-red: #ff4141; }
        body { background: var(--bazaar-dark); color: #e0e0e0; font-family: 'Courier New', monospace; text-align: center; margin: 0; }
        h1 { color: var(--bazaar-gold); margin-top: 20px; text-transform: uppercase; }
        
        table { width: 90%; margin: 20px auto; border-collapse: collapse; background: rgba(20, 20, 20, 0.8); }
        th { border-bottom: 2px solid var(--bazaar-gold); color: var(--bazaar-gold); padding: 15px; text-transform: uppercase; }
        td { border-bottom: 1px solid #222; padding: 12px; font-size: 0.9rem; }
        
        .status-active { color: var(--mesh-green); font-weight: bold; }
        .status-exiled { color: var(--mesh-red); font-weight: bold; animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        
        .ts-high { color: var(--mesh-green); }
        .ts-low { color: var(--mesh-red); }
    </style>
</head>
<body>

    <nav style="background: #111; border-bottom: 2px solid var(--bazaar-gold); padding: 10px; display: flex; justify-content: center; gap: 20px;">
        <a href="merchant-dashboard.html" style="color: var(--bazaar-gold); text-decoration: none;">[ DASHBOARD ]</a>
        <a href="merchant-leaderboard.html" style="color: var(--bazaar-gold); text-decoration: none; border-bottom: 1px solid;">[ LEADERBOARD ]</a>
        <a href="merchant-catalog.html" style="color: var(--bazaar-gold); text-decoration: none;">[ CATALOG ]</a>
    </nav>

    <h1>Bazaar DAO | Global Standings</h1>

    <table>
        <thead>
            <tr>
                <th>Pioneer</th>
                <th>Trust Score</th>
                <th>BZR Balance</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body">
            </tbody>
    </table>

    <script>
        const MESH_API = "https://hypercoagulable-nondistortingly-valarie.ngrok-free.dev";

        async function syncLeaderboard() {
            try {
                const response = await fetch(`${MESH_API}/get-ledger`);
                const data = await response.json();
                const body = document.getElementById('leaderboard-body');

                // Sort by Trust Score (Highest First)
                data.sort((a, b) => b.trust_score - a.trust_score);

                body.innerHTML = data.map(p => `
                    <tr>
                        <td style="font-weight:bold;">${p.pioneer}</td>
                        <td class="${p.trust_score > 89 ? 'ts-high' : 'ts-low'}">${p.trust_score} TS</td>
                        <td style="color: var(--bazaar-gold);">${p.bzr_balance} BZR</td>
                        <td class="${p.status === 'Active' ? 'status-active' : 'status-exiled'}">${p.status.toUpperCase()}</td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error("Leaderboard Offline");
            }
        }

        setInterval(syncLeaderboard, 10000);
        syncLeaderboard();
    </script>
</body>
</html>
