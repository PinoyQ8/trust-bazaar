<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazaar Academy | MESH Terminal</title>
    <style>
        :root {
            --bazaar-green: #00ff41;
            --bazaar-bg: #050505;
            --mesh-glow: 0 0 10px rgba(0, 255, 65, 0.5);
        }
        body {
            background-color: var(--bazaar-bg);
            color: var(--bazaar-green);
            font-family: 'Courier New', monospace;
            margin: 0; padding: 20px; text-align: center;
        }
        .academy-vault {
            width: 100%; max-width: 600px; margin: 20px auto;
            border: 1px solid var(--bazaar-green);
            padding: 20px; box-shadow: var(--mesh-glow);
            background: rgba(0, 59, 0, 0.05);
        }
        .gate-section {
            border: 1px dashed var(--bazaar-green);
            padding: 15px; margin-bottom: 20px; text-align: left;
        }
        input { 
            background: #000; border: 1px solid var(--bazaar-green); 
            color: var(--bazaar-green); padding: 10px; width: 80%; margin-bottom: 10px;
        }
        button {
            background: var(--bazaar-green); color: #000;
            border: none; padding: 10px 20px; font-weight: bold; cursor: pointer;
        }
        .blink { animation: blinker 2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        nav { margin-bottom: 20px; }
        nav a { color: #FFD700; text-decoration: none; margin: 0 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav>
        <a href="merchant-dashboard.html">[ DASHBOARD ]</a>
        <a href="merchant-leaderboard.html">[ LEADERBOARD ]</a>
        <a href="merchant-catalog.html">[ CATALOG ]</a>
    </nav>

    <div class="academy-vault">
        <h1>[BAZAAR ACADEMY]</h1>
        <p style="font-size: 0.8rem;">Status: March 12 Ignition - <span style="color:#ffcc00;" class="blink">T-Minus 5 Days</span></p>

        <div class="gate-section">
            <p>> [GENESIS HUNT] <span id="genesis-count">0</span>/5 PIONEERS</p>
            <input type="text" id="pioneerKeyInput" placeholder="BZR-XXXX-XXXX">
            <button onclick="verifyPioneerKey()">VERIFY KEY</button>
            <div id="meshTerminal" style="margin-top:10px; font-size: 0.7rem;">SYSTEM IDLE...</div>
        </div>

        <div class="gate-section">
            <p>> [AUDIT] MERCHANT DIRECTORY</p>
            <button onclick="searchMerchants()" style="width: 100%;">SCAN J: DRIVE DATABASE</button>
            <div id="searchOutput" style="margin-top:10px; font-size: 0.7rem;">READY...</div>
        </div>
    </div>

    <script>
        // CHANGE THIS TO YOUR NGROK URL TO WORK ON S23 5G
        const MESH_API = "https://hypercoagulable-nondistortingly-valarie.ngrok-free.dev";

        async function verifyPioneerKey() {
            const term = document.getElementById('meshTerminal');
            term.innerHTML = "SCANNING MESH...";
            // Simulate for Academy if API fails
            setTimeout(() => {
                term.style.color = "yellow";
                term.innerHTML = "[SIM] KEY VERIFIED. REDIRECTING...";
                setTimeout(() => { window.location.href = "merchant-dashboard.html"; }, 1500);
            }, 1000);
        }

        async function searchMerchants() {
            const output = document.getElementById('searchOutput');
            output.innerHTML = "ACCESSING VAULT...";
            try {
                const res = await fetch(`${MESH_API}/get-inventory`);
                const data = await res.json();
                output.innerHTML = `[FOUND] ${data.length} Assets Registered.`;
            } catch (e) {
                output.innerHTML = "[OFFLINE] Connect to X570 Tunnel.";
            }
        }
    </script>
</body>
</html>
