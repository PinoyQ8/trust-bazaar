        async function pioneerHandshake() {
    console.log("[MESH-SCAN] Initiating Multi-Stage Handshake...");
    try {
        const scopes = ['username', 'payments'];
        const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
        const username = auth.user.username;
        console.log(`> PIONEER DETECTED: ${username}`);

        const payment = Pi.createPayment({
            amount: 0.01, 
            memo: "BZR_GENESIS_VERIFICATION",
            metadata: { type: "academy_handshake", pioneer_id: username }
        }, {
            // PHASE 1: SERVER APPROVAL
            onReadyForServerApproval: async function(paymentId) {
                console.log(`[GATE 1] Requesting Approval for: ${paymentId}`);
                await fetch('http://localhost:3000/approve-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId: paymentId })
                });
            },
            // PHASE 2: LEDGER COMPLETION
            onReadyForServerCompletion: async function(paymentId, txid) {
                console.log(`[GATE 2] Handshake Verified! TXID: ${txid}`);
                const record = await fetch('http://localhost:3000/complete-handshake', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, txid: txid })
                });
                
                if (record.ok) {
                    alert(`WELCOME REAL PIONEER ${username}.\nYour TXID ${txid} is now Hard-Coded in the Genesis Ledger.`);
                }
            },
            onCancel: function(paymentId) { console.warn("HANDSHAKE ABORTED."); },
            onError: function(error, payment) { console.error("MESH ERROR:", error); }
        });
    } catch (err) {
        console.error("AUTHENTICATION FAILED:", err);
    }
}

        function onIncompletePaymentFound(payment) {
            console.log("STAT: Incomplete payment detected in buffer.", payment);

}
